<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<title>Dashboard Kehadiran</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#0f172a,#020617);
    color: white;
    text-align: center;
}

h1 {
    font-size: 42px;
    margin-top: 20px;
    color: #38bdf8;
    text-shadow: 0 0 15px #38bdf8;
}

.container {
    display: grid;
    grid-template-columns: repeat(auto-fit,minmax(320px,1fr));
    gap: 20px;
    padding: 20px;
}

.card {
    background: rgba(30,41,59,0.8);
    padding: 20px;
    border-radius: 20px;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 20px rgba(56,189,248,0.2);
}

.big {
    font-size: 55px;
    font-weight: bold;
}

.good { color: #22c55e; }
.bad { color: #ef4444; }

ul {
    list-style: none;
    padding: 0;
    font-size: 18px;
}

.rank li {
    margin: 6px 0;
    padding: 8px;
    border-radius: 10px;
    background: rgba(255,255,255,0.05);
}

.alert li { color: #f87171; }

.footer {
    opacity: 0.5;
    margin: 10px;
    font-size: 12px;
}
</style>
</head>

<body>

<div style="margin-top:20px;">
    <h1>📊 Dashboard Kehadiran SK Labu Besar</h1>
</div>

<div class="container">

<div class="card">
    <h2 id="todayTitle">📅 Kehadiran Hari Ini</h2>
    <div id="percent" class="big">Loading...</div>
    <p id="total"></p>
</div>

<div class="card">
    <h2>🏆 Ranking Kelas</h2>

    <h3>📅 Mingguan (Ahad–Khamis)</h3>
    <ul id="ranking_week" class="rank"></ul>

    <h3>🗓 Bulanan</h3>
    <ul id="ranking_month" class="rank"></ul>

    <h3>🌍 Keseluruhan</h3>
    <ul id="ranking_all" class="rank"></ul>
</div>

<div class="card">
    <h2 id="alertTitle">⚠️ Belum Isi</h2>
    <ul id="alert" class="alert"></ul>
</div>

<div class="card">
    <h2>📈 Trend 7 Hari</h2>
    <canvas id="chart"></canvas>
</div>

</div>

<div class="footer">Auto Refresh setiap 10 minit</div>

<script>

const URL = "https://opensheet.elk.sh/1KPsN_fdh7b1rj-6fJOljPdcn87Tz2qmh-iMwUhwPrbg/Kehadiran";
const TOTAL_SEKOLAH = 520;

const ALL_CLASSES = [
"1 Amber","1 Amethyst","1 Aquamarine",
"2 Amber","2 Amethyst","2 Aquamarine",
"3 Amber","3 Amethyst","3 Aquamarine",
"4 Amber","4 Amethyst","4 Aquamarine",
"5 Amber","5 Amethyst","5 Aquamarine",
"6 Amber","6 Amethyst","6 Aquamarine",
"PRA CITRINE","PRA CRYSTAL"
];

async function loadData() {

    const now = new Date();

// format Malaysia
    const tarikh = now.toLocaleDateString("ms-MY", {
        weekday: 'long',
        day: 'numeric',
        month: 'long',
        year: 'numeric'
    });

// set dekat title
    document.getElementById("todayTitle").innerText = `📅 Kehadiran Hari Ini (${tarikh})`;
    document.getElementById("alertTitle").innerText = `⚠️ Belum Rekod Kehadiran (${tarikh})`;
    
    const res = await fetch(URL);
    const data = await res.json();

    const today = new Date().toLocaleDateString("en-GB");

    let hadir = 0;
    let jumlahMasuk = 0;
    let recordedToday = [];
    let dates = {};

    data.forEach(r => {

        const jumlah = Number(r.Jumlah);
        const absent = r["Tidak Hadir"] ? r["Tidak Hadir"].split(",").length : 0;
        const hadirNow = jumlah - absent;

        if (r.Tarikh === today) {
            hadir += hadirNow;
            jumlahMasuk += jumlah;
            recordedToday.push(r.Kelas.toLowerCase());
        }

        if (!dates[r.Tarikh]) {
            dates[r.Tarikh] = {h:0,t:0};
        }

        dates[r.Tarikh].h += hadirNow;
        dates[r.Tarikh].t += jumlah;
    });

    // % sebenar
    const percent = ((hadir / TOTAL_SEKOLAH) * 100).toFixed(1);
    const percentEl = document.getElementById("percent");

    percentEl.innerText = percent + "%";
    percentEl.className = percent >= 95 ? "big good" : "big bad";

    const belumRekod = TOTAL_SEKOLAH - jumlahMasuk;

    document.getElementById("total").innerHTML = `
        Hadir: ${hadir} / ${TOTAL_SEKOLAH}<br>
        Belum Rekod: ${belumRekod} murid<br>
        Jumlah Murid: ${TOTAL_SEKOLAH} murid
    `;

    // ALERT
    const belum = ALL_CLASSES.filter(k => !recordedToday.includes(k.toLowerCase()));

    const alertBox = document.getElementById("alert");
    alertBox.innerHTML = "";

    if (belum.length === 0) {
        alertBox.innerHTML = "<li style='color:#22c55e'>✅ Semua kelas sudah isi</li>";
    } else {
        belum.forEach(k=>{
            alertBox.innerHTML += `<li>❌ ${k}</li>`;
        });
    }

    if (jumlahMasuk < TOTAL_SEKOLAH) {
        alertBox.innerHTML += `<li style="color:#ef4444">🚨 Data belum lengkap (${jumlahMasuk}/${TOTAL_SEKOLAH})</li>`;
    }

    // 🔥 RANKING FUNCTION (SYNC BOT)
    function kiraRanking(data, mode) {

        let kelas = {};
        const today = new Date();

        // 🔥 AHAD START
        const startWeek = new Date(today);
        const day = today.getDay(); // Ahad = 0
        startWeek.setDate(today.getDate() - day);
        startWeek.setHours(0,0,0,0);

        // 🔥 KHAMIS END
        const endWeek = new Date(startWeek);
        endWeek.setDate(startWeek.getDate() + 4);
        endWeek.setHours(23,59,59,999);

        const startMonth = new Date(today);
        startMonth.setDate(today.getDate() - 30);

        data.forEach(r => {

            const jumlah = Number(r.Jumlah);
            const absent = r["Tidak Hadir"] ? r["Tidak Hadir"].split(",").length : 0;
            const hadir = jumlah - absent;

            const [d,m,y] = r.Tarikh.split("/");
            const date = new Date(`${y}-${m}-${d}`);

            if (mode === "week") {
                if (date < startWeek || date > endWeek) return;
            }

            if (mode === "month") {
                if (date < startMonth) return;
            }

            if (!kelas[r.Kelas]) {
                kelas[r.Kelas] = {h:0,t:0};
            }

            kelas[r.Kelas].h += hadir;
            kelas[r.Kelas].t += jumlah;
        });

        let ranking = Object.entries(kelas).map(([k,v])=>{
            return [k, (v.h/v.t)*100];
        });

        ranking.sort((a,b)=>b[1]-a[1]);

        return ranking.slice(0,3);
    }

    const weekly = kiraRanking(data, "week");
    const monthly = kiraRanking(data, "month");
    const overall = kiraRanking(data, null);

    function render(id, list) {
        const medal = ["🥇","🥈","🥉"];
        const el = document.getElementById(id);
        el.innerHTML = "";

        list.forEach((r,i)=>{
            el.innerHTML += `<li>${medal[i]} ${r[0]} - ${r[1].toFixed(1)}%</li>`;
        });
    }

    render("ranking_week", weekly);
    render("ranking_month", monthly);
    render("ranking_all", overall);

    // CHART
    const labels = Object.keys(dates).slice(-7);
    const values = labels.map(d => (dates[d].h/dates[d].t)*100);

    new Chart(document.getElementById("chart"), {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: 'Trend Kehadiran (%)',
                data: values,
                tension: 0.4
            }]
        }
    });
}

loadData();

setInterval(() => location.reload(), 600000);

</script>

</body>
</html>
