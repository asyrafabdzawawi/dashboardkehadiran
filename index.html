<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<title>Dashboard Kehadiran</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#0f172a,#020617);
    color: white;
    text-align: center;
}

/* TITLE */
h1 {
    font-size: 42px;
    margin-top: 20px;
    color: #38bdf8;
    text-shadow: 0 0 15px #38bdf8;
}

/* GRID */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit,minmax(300px,1fr));
    gap: 20px;
    padding: 20px;
}

/* CARD */
.card {
    background: rgba(30,41,59,0.8);
    padding: 20px;
    border-radius: 20px;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 20px rgba(56,189,248,0.2);
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.03);
}

/* TODAY */
.big {
    font-size: 55px;
    font-weight: bold;
}

/* STATUS COLOR */
.good { color: #22c55e; }
.bad { color: #ef4444; }

/* LIST */
ul {
    list-style: none;
    padding: 0;
    font-size: 18px;
}

/* RANK STYLE */
.rank li {
    margin: 8px 0;
    padding: 10px;
    border-radius: 10px;
    background: rgba(255,255,255,0.05);
}

/* ALERT */
.alert li {
    color: #f87171;
}

/* FOOTER */
.footer {
    opacity: 0.5;
    margin: 10px;
    font-size: 12px;
}

</style>
</head>

<body>

<h1>📊 Dashboard Kehadiran Sekolah</h1>

<div class="container">

    <!-- TODAY -->
    <div class="card">
        <h2>📅 Kehadiran Hari Ini</h2>
        <div id="percent" class="big">Loading...</div>
        <p id="total"></p>
    </div>

    <!-- RANKING -->
    <div class="card">
        <h2>🏆 Top 3 Kelas</h2>
        <ul id="ranking" class="rank"></ul>
    </div>

    <!-- ALERT -->
    <div class="card">
        <h2>⚠️ Belum Isi</h2>
        <ul id="alert" class="alert"></ul>
    </div>

    <!-- CHART -->
    <div class="card">
        <h2>📈 Trend 7 Hari</h2>
        <canvas id="chart"></canvas>
    </div>

</div>

<div class="footer">Auto Refresh setiap 10 saat</div>

<script>

const URL = "https://opensheet.elk.sh/1KPsN_fdh7b1rj-6fJOljPdcn87Tz2qmh-iMwUhwPrbg/Kehadiran";

// 🔥 TOTAL SEBENAR SEKOLAH
const TOTAL_SEKOLAH = 520;

const ALL_CLASSES = [
"1 Amber","1 Amethyst","1 Aquamarine",
"2 Amber","2 Amethyst","2 Aquamarine",
"3 Amber","3 Amethyst","3 Aquamarine",
"4 Amber","4 Amethyst","4 Aquamarine",
"5 Amber","5 Amethyst","5 Aquamarine",
"6 Amber","6 Amethyst","6 Aquamarine",
"PRA CITRINE","PRA CRYSTAL"
];

async function loadData() {

    const res = await fetch(URL);
    const data = await res.json();

    const today = new Date().toLocaleDateString("en-GB");

    let hadir = 0;
    let kelasStat = {};
    let dates = {};
    let recordedToday = [];
    let jumlahMasuk = 0;

    data.forEach(r => {

        const jumlah = Number(r.Jumlah);
        const absent = r["Tidak Hadir"] ? r["Tidak Hadir"].split(",").length : 0;
        const hadirNow = jumlah - absent;

        // TODAY
        if (r.Tarikh === today) {
            hadir += hadirNow;
            jumlahMasuk += jumlah;
            recordedToday.push(r.Kelas.toLowerCase());

            // 🔴 detect kelas tak lengkap
            if (jumlah < 25) {
                console.warn("⚠️ Data mungkin tak lengkap:", r.Kelas);
            }
        }

        // RANK
        if (!kelasStat[r.Kelas]) {
            kelasStat[r.Kelas] = {h:0,t:0};
        }
        kelasStat[r.Kelas].h += hadirNow;
        kelasStat[r.Kelas].t += jumlah;

        // TREND
        if (!dates[r.Tarikh]) {
            dates[r.Tarikh] = {h:0,t:0};
        }
        dates[r.Tarikh].h += hadirNow;
        dates[r.Tarikh].t += jumlah;

    });

    // 🔥 % SEBENAR (guna 520)
    const percent = ((hadir / TOTAL_SEKOLAH) * 100).toFixed(1);

    const percentEl = document.getElementById("percent");
    percentEl.innerText = percent + "%";

    // 🔴 warna ikut status sebenar
    if (percent >= 95) percentEl.className = "big good";
    else percentEl.className = "big bad";

    // 🔥 PAPAR INFO
    document.getElementById("total").innerHTML = `
        Hadir: ${hadir} / ${TOTAL_SEKOLAH} murid<br>
        Data Masuk: ${jumlahMasuk} murid
    `;

    // 🏆 RANKING
    let ranking = Object.entries(kelasStat).map(([k,v])=>{
        return [k, (v.h/v.t)*100];
    });

    ranking.sort((a,b)=>b[1]-a[1]);

    const medal = ["🥇","🥈","🥉"];
    const top3 = ranking.slice(0,3);

    const ul = document.getElementById("ranking");
    ul.innerHTML = "";

    top3.forEach((r,i)=>{
        ul.innerHTML += `<li>${medal[i]} ${r[0]} - ${r[1].toFixed(1)}%</li>`;
    });

    // ⚠️ ALERT
    const belum = ALL_CLASSES.filter(k => !recordedToday.includes(k.toLowerCase()));

    const alertBox = document.getElementById("alert");
    alertBox.innerHTML = "";

    if (belum.length === 0) {
        alertBox.innerHTML = "<li style='color:#22c55e'>✅ Semua kelas sudah isi</li>";
    } else {
        belum.forEach(k=>{
            alertBox.innerHTML += `<li>❌ ${k}</li>`;
        });
    }

    // 🔴 WARNING BESAR kalau data tak cukup
    if (jumlahMasuk < TOTAL_SEKOLAH) {
        alertBox.innerHTML += `<li style="color:#ef4444">🚨 Data belum lengkap (${jumlahMasuk}/${TOTAL_SEKOLAH})</li>`;
    }

    // 📈 CHART
    const labels = Object.keys(dates).slice(-7);
    const values = labels.map(d => (dates[d].h/dates[d].t)*100);

    new Chart(document.getElementById("chart"), {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: 'Trend Kehadiran (%)',
                data: values,
                tension: 0.4
            }]
        }
    });

}

loadData();

// AUTO REFRESH
setInterval(() => location.reload(), 10000);

</script>
</body>
</html>
