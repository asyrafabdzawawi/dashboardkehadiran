<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<title>Dashboard Kehadiran</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#0f172a,#020617);
    color: white;
    text-align: center;
}

h1 {
    font-size: 40px;
    margin-top: 20px;
    color: #38bdf8;
}

.container {
    display: grid;
    grid-template-columns: repeat(4,1fr);
    gap: 20px;
    padding: 20px;
}

.full { grid-column: span 4; }

.card {
    background: rgba(30,41,59,0.9);
    padding: 20px;
    border-radius: 20px;
}

.big {
    font-size: 60px;
    font-weight: bold;
}

.good { color: #22c55e; }
.bad { color: #ef4444; }

ul { list-style: none; padding: 0; }

.rank li {
    padding: 6px;
    margin: 4px 0;
    background: rgba(255,255,255,0.05);
    border-radius: 8px;
}

.alert li { color: #f87171; }

select {
    padding: 5px;
    margin-bottom: 10px;
}
</style>
</head>

<body>

<h1>📊 Dashboard Kehadiran SK Labu Besar</h1>

<div class="container">

<!-- TOP -->
<div class="card full">
    <h2 id="todayTitle"></h2>
    <div id="percent" class="big"></div>
    <p id="total"></p>
</div>

<!-- RANKING -->
<div class="card">
    <h2>🏆 Ranking</h2>

    <h4>📅 Mingguan</h4>
    <ul id="ranking_week" class="rank"></ul>

    <h4>🗓 Bulanan</h4>
    <ul id="ranking_month" class="rank"></ul>

    <h4>🌍 Keseluruhan</h4>
    <ul id="ranking_all" class="rank"></ul>
</div>

<!-- ALERT -->
<div class="card">
    <h2 id="alertTitle"></h2>
    <ul id="alert" class="alert"></ul>
</div>

<!-- SEMAK KEHADIRAN -->
<div class="card">
    <h2>✅ Semak Kehadiran</h2>
    <select id="classFilter"></select>
    <div id="absentList"></div>
</div>

<!-- CHART -->
<div class="card">
    <h2>📈 Trend 7 Hari</h2>
    <canvas id="chart"></canvas>
</div>

</div>

<script>

const URL = "https://opensheet.elk.sh/1KPsN_fdh7b1rj-6fJOljPdcn87Tz2qmh-iMwUhwPrbg/Kehadiran";
const TOTAL = 520;

async function loadData(){

const nowDate = new Date().toDateString();

if (nowDate !== lastDate) {
    console.log("🔄 Hari baru → reload");
    location.reload();
}
console.log("⏱ Data refreshed:", new Date().toLocaleTimeString());

let data;

try {
    const res = await fetch(URL);
    data = await res.json();
} catch (e) {
    console.log("❌ Error fetch:", e);
    return;
}

const today = new Date();
const todayStr = today.toLocaleDateString("en-GB");

document.getElementById("todayTitle").innerText =
"📅 Kehadiran (" + today.toLocaleDateString("ms-MY") + ")";

document.getElementById("alertTitle").innerText =
"⚠️ Belum Rekod (" + today.toLocaleDateString("ms-MY") + ")";

let hadir=0, masuk=0;

let absentByClass={}, absentHistory={}, dates={}, recorded=[];

/* LOOP DATA */
data.forEach(r=>{
    const jumlah=+r.Jumlah;
    const absent=r["Tidak Hadir"] ? r["Tidak Hadir"].split(",").map(x=>x.trim()) : [];
    const hadirNow=jumlah-absent.length;

    if(r.Tarikh===todayStr){
        hadir+=hadirNow;
        masuk+=jumlah;
        recorded.push(r.Kelas);

        if(absent.length){
            absentByClass[r.Kelas]=absent;
        }
    }

    absent.forEach(n=>{
        absentHistory[n]=(absentHistory[n]||0)+1;
    });

    if(!dates[r.Tarikh]) dates[r.Tarikh]={h:0,t:0};
    dates[r.Tarikh].h+=hadirNow;
    dates[r.Tarikh].t+=jumlah;
});

/* TOP CARD */
const percent=((hadir/TOTAL)*100).toFixed(1);
const el=document.getElementById("percent");
el.innerText=percent+"%";
el.className=percent>=95?"big good":"big bad";

document.getElementById("total").innerHTML=
`Hadir: ${hadir}/${TOTAL}<br>
Belum Rekod: ${TOTAL-masuk}`;

if (masuk >= TOTAL && !isStopped) {

    clearInterval(refreshInterval);
    isStopped = true;

    console.log("✅ Semua kelas telah isi. Auto refresh dihentikan.");

    document.getElementById("total").innerHTML += 
    `<br><span style="color:#22c55e">✔️ Data lengkap (auto refresh dihentikan)</span>`;
}

/* ALERT */
const classes=[
"1 Amber","1 Amethyst","1 Aquamarine",
"2 Amber","2 Amethyst","2 Aquamarine",
"3 Amber","3 Amethyst","3 Aquamarine",
"4 Amber","4 Amethyst","4 Aquamarine",
"5 Amber","5 Amethyst","5 Aquamarine",
"6 Amber","6 Amethyst","6 Aquamarine",
"PRA CITRINE","PRA CRYSTAL"
];

const alertBox=document.getElementById("alert");
alertBox.innerHTML="";
classes.forEach(k=>{
if(!recorded.includes(k)){
alertBox.innerHTML+=`<li>❌ ${k}</li>`;
}
});

/* RANKING */
function rank(mode){

let kls={};

const now=new Date();

// 🔥 AHAD (start minggu)
const start=new Date(now);
const day=now.getDay(); // Ahad = 0
start.setDate(now.getDate()-day);
start.setHours(0,0,0,0); // IMPORTANT

// 🔥 KHAMIS (end minggu)
const end=new Date(start);
end.setDate(start.getDate()+4);
end.setHours(23,59,59,999); // IMPORTANT

// 🔥 BULAN (30 hari)
const startMonth=new Date(now);
startMonth.setDate(now.getDate()-30);
startMonth.setHours(0,0,0,0);

data.forEach(r=>{

const [d,m,y]=r.Tarikh.split("/");
const dt=new Date(`${y}-${m}-${d}`);

if(mode==="week"){
    if(dt < start || dt > end) return;
}

if(mode==="month"){
    if(dt < startMonth) return;
}

const j=+r.Jumlah;
const ab=r["Tidak Hadir"]?r["Tidak Hadir"].split(",").length:0;
const h=j-ab;

if(!kls[r.Kelas])kls[r.Kelas]={h:0,t:0};

kls[r.Kelas].h+=h;
kls[r.Kelas].t+=j;

});

return Object.entries(kls)
.map(([k,v])=>[k,(v.h/v.t)*100])
.sort((a,b)=>b[1]-a[1])
.slice(0,3);
}

function render(id,data){
const el=document.getElementById(id);
el.innerHTML="";
["🥇","🥈","🥉"].forEach((m,i)=>{
if(data[i]) el.innerHTML+=`<li>${m} ${data[i][0]} (${data[i][1].toFixed(1)}%)</li>`;
});
}

render("ranking_week",rank("week"));
render("ranking_month",rank("month"));
render("ranking_all",rank());

/* FILTER */
const filter=document.getElementById("classFilter");
filter.innerHTML=`<option value="ALL">Semua Kelas</option>`;
classes.forEach(k=>{
filter.innerHTML+=`<option>${k}</option>`;
});

function renderAbsent(sel="ALL"){

const box=document.getElementById("absentList");
box.innerHTML="";

classes.forEach(k=>{

if(sel!=="ALL" && k!==sel) return;

const list=absentByClass[k]||[];

box.innerHTML+=`<div style="margin-bottom:10px;">
<b style="color:#38bdf8">${k}</b>`;

if(list.length===0){
box.innerHTML+=`<p style="color:#22c55e">✅ Semua hadir</p>`;
}else{
box.innerHTML+=`<ul>`+
list.map(n=>{
const bad=absentHistory[n]>=3;
return `<li style="color:#ef4444">
❌ ${n}
</li>`;
}).join("")+"</ul>";
}

box.innerHTML+=`</div>`;
});

}

filter.onchange=e=>renderAbsent(e.target.value);
renderAbsent();

/* CHART FIX (NO UNDEFINED) */
const sortedDates = Object.keys(dates)
.sort((a,b)=>{
const [d1,m1,y1]=a.split("/");
const [d2,m2,y2]=b.split("/");
return new Date(`${y1}-${m1}-${d1}`) - new Date(`${y2}-${m2}-${d2}`);
})
.slice(-7);

const values = sortedDates.map(d=>{
const v=dates[d];
return v.t ? (v.h/v.t)*100 : 0;
});

if (myChart) {
    myChart.destroy(); // buang chart lama
}

myChart = new Chart(document.getElementById("chart"),{
type:'line',
data:{
labels:sortedDates,
datasets:[{
label:"%",
data:values,
tension:0.4
}]
}
});

}
let isStopped = false;
let myChart;
let lastDate = new Date().toDateString();
loadData();
let refreshInterval = setInterval(loadData, 300000);

</script>

</body>
</html>
