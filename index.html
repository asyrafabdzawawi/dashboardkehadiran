<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<title>Dashboard Kehadiran</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#0f172a,#020617);
    color: white;
    text-align: center;
}

h1 {
    font-size: 42px;
    margin-top: 20px;
    color: #38bdf8;
}

/* 🔥 LAYOUT */
.container {
    display: grid;
    grid-template-columns: repeat(4,1fr);
    gap: 20px;
    padding: 20px;
}

.full {
    grid-column: span 4;
}

.card {
    background: rgba(30,41,59,0.85);
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 0 20px rgba(56,189,248,0.2);
}

.big {
    font-size: 60px;
    font-weight: bold;
}

.good { color: #22c55e; }
.bad { color: #ef4444; }

ul { list-style: none; padding: 0; }

.rank li {
    margin: 5px 0;
    padding: 8px;
    background: rgba(255,255,255,0.05);
    border-radius: 10px;
}

.alert li { color: #f87171; }

select {
    padding:5px;
    margin-bottom:10px;
}

</style>
</head>

<body>

<h1>📊 Dashboard Kehadiran SK Labu Besar</h1>

<div class="container">

<!-- 🔥 FULL WIDTH -->
<div class="card full">
    <h2 id="todayTitle"></h2>
    <div id="percent" class="big">Loading...</div>
    <p id="total"></p>
</div>

<!-- RANKING -->
<div class="card">
    <h2>🏆 Ranking</h2>
    <h4>Mingguan</h4>
    <ul id="ranking_week"></ul>
    <h4>Bulanan</h4>
    <ul id="ranking_month"></ul>
</div>

<!-- ALERT -->
<div class="card">
    <h2 id="alertTitle"></h2>
    <ul id="alert"></ul>
</div>

<!-- ABSENT -->
<div class="card">
    <h2>🚫 Tidak Hadir</h2>
    <select id="classFilter"></select>
    <div id="absentList"></div>
</div>

<!-- CHART -->
<div class="card">
    <h2>📈 Trend</h2>
    <canvas id="chart"></canvas>
</div>

</div>

<script>

const URL = "https://opensheet.elk.sh/1KPsN_fdh7b1rj-6fJOljPdcn87Tz2qmh-iMwUhwPrbg/Kehadiran";
const TOTAL_SEKOLAH = 520;

async function loadData(){

const res = await fetch(URL);
const data = await res.json();

const todayStr = new Date().toLocaleDateString("en-GB");
const now = new Date();

document.getElementById("todayTitle").innerText =
"📅 Kehadiran (" + now.toLocaleDateString("ms-MY") + ")";

document.getElementById("alertTitle").innerText =
"⚠️ Belum Rekod (" + now.toLocaleDateString("ms-MY") + ")";

let hadir=0, masuk=0;
let absentByClass={}, absentHistory={}, dates={}, recorded=[];

data.forEach(r=>{
    const jumlah=+r.Jumlah;
    const absent=r["Tidak Hadir"]?r["Tidak Hadir"].split(","):[];
    const hadirNow=jumlah-absent.length;

    if(r.Tarikh===todayStr){
        hadir+=hadirNow;
        masuk+=jumlah;
        recorded.push(r.Kelas);

        if(absent.length){
            absentByClass[r.Kelas]=absent;
        }
    }

    absent.forEach(n=>{
        n=n.trim();
        absentHistory[n]=(absentHistory[n]||0)+1;
    });

    if(!dates[r.Tarikh]) dates[r.Tarikh]={h:0,t:0};
    dates[r.Tarikh].h+=hadirNow;
    dates[r.Tarikh].t+=jumlah;
});

/* TODAY */
const percent=((hadir/TOTAL_SEKOLAH)*100).toFixed(1);
const el=document.getElementById("percent");
el.innerText=percent+"%";
el.className=percent>=95?"big good":"big bad";

document.getElementById("total").innerHTML=
`Hadir: ${hadir}/${TOTAL_SEKOLAH}<br>
Belum Rekod: ${TOTAL_SEKOLAH-masuk}`;

/* ALERT */
const allClasses=[
"1 Amber","1 Amethyst","1 Aquamarine",
"2 Amber","2 Amethyst","2 Aquamarine",
"3 Amber","3 Amethyst","3 Aquamarine",
"4 Amber","4 Amethyst","4 Aquamarine",
"5 Amber","5 Amethyst","5 Aquamarine",
"6 Amber","6 Amethyst","6 Aquamarine"
];

const alertBox=document.getElementById("alert");
alertBox.innerHTML="";

allClasses.forEach(k=>{
if(!recorded.includes(k)){
alertBox.innerHTML+=`<li>❌ ${k}</li>`;
}
});

/* RANKING */
function rank(data,mode){
let kls={};
const now=new Date();
const start=new Date(now); start.setDate(now.getDate()-now.getDay());
const end=new Date(start); end.setDate(start.getDate()+4);

data.forEach(r=>{
const [d,m,y]=r.Tarikh.split("/");
const dt=new Date(`${y}-${m}-${d}`);

if(mode==="week"&&(dt<start||dt>end))return;

const j=+r.Jumlah;
const ab=r["Tidak Hadir"]?r["Tidak Hadir"].split(",").length:0;
const h=j-ab;

if(!kls[r.Kelas])kls[r.Kelas]={h:0,t:0};
kls[r.Kelas].h+=h;kls[r.Kelas].t+=j;
});

return Object.entries(kls)
.map(([k,v])=>[k,(v.h/v.t)*100])
.sort((a,b)=>b[1]-a[1]).slice(0,3);
}

function render(id,data){
const el=document.getElementById(id);
el.innerHTML="";
["🥇","🥈","🥉"].forEach((m,i)=>{
if(data[i]) el.innerHTML+=`<li>${m} ${data[i][0]}</li>`;
});
}

render("ranking_week",rank(data,"week"));
render("ranking_month",rank(data));

/* FILTER + ABSENT */
const filter=document.getElementById("classFilter");
filter.innerHTML=`<option value="ALL">Semua</option>`;
Object.keys(absentByClass).forEach(k=>{
filter.innerHTML+=`<option>${k}</option>`;
});

function renderAbsent(sel="ALL"){
const box=document.getElementById("absentList");
box.innerHTML="";

Object.entries(absentByClass).forEach(([k,list])=>{
if(sel!=="ALL"&&k!==sel)return;

box.innerHTML+=`<b>${k}</b><ul>`+
list.map(n=>{
const bad=absentHistory[n.trim()]>=3;
return `<li style="color:${bad?'#ef4444':'white'}">
${bad?'🔴':'❌'} ${n}
</li>`;
}).join("")+"</ul>";
});
}

filter.onchange=e=>renderAbsent(e.target.value);
renderAbsent();

/* CHART */
const labels=Object.keys(dates).slice(-7);
const values=labels.map(d=>dates[d].h/dates[d].t*100);

new Chart(document.getElementById("chart"),{
type:'line',
data:{labels,datasets:[{data:values}]}
});

}

loadData();
setInterval(loadData,600000);

</script>

</body>
</html>
